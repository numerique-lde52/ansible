    - name: Update apt repo and cache
      apt: 
        update_cache: yes
        force_apt_get: yes
        cache_valid_time: 3600

    - name: Install sublime text, sublime merge and veyon
      apt:
        name: 
            - apt-transport-https
            - sublime-text
            - sublime-merge
