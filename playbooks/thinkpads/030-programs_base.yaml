---
#
# Install somes programs
#
# invoque with :
# ansible-playbook -i admin.yaml playbooks/thinkpads/030-programs_base.yaml
#
# source : https://docs.ansible.com/ansible/latest/collections/ansible/builtin/apt_module.html

- name: Install packages

# CHANGE THIS IF NECESSARY
#        vvvvvvvv
  hosts: thinkpads

  become: yes

  tasks:
    - name: Install packages

      apt:
        name: 
            - audacity # montage audio
            - backintime-qt # sauvegarde
#            - blender # montage video
            - chromium-browser
            - curl 
            - dconf-editor # GUI for GNOME desktop environment configuration
            - gimp # retouche d'image
#            - git-gui # with git
            - gnome-software-plugin-flatpak # bibliothèque logicielle Gnome
            - gnome-tweaks # configuration gnome
            - inkscape # dessin vectoriel
            - hyphen-fr # disctionnaire français
            - hunspell-fr # disctionnaire français
            - libreoffice
            - libreoffice-l10n-fr
#            - meld # comparateur de fichiers / dossiers
#            - obs-studio # montage / regie video
#            - openshot-qt # montage video
            - python3-psutil # needed to manage dconf remotelly
            - python3-passlib # new crypto lib
            - scribus # pao
            - synaptic # gestionnaire de paquets
            - system-config-printer # configuration imprimantes supplémentaire
#            - timeshift # snapshot system
            - vlc
#            - winff # transcodeur vidéo

        state: present

    - name: prepare eula for ttf-mscorefonts-installer in ubuntu-restricted-extras
      debconf:
        name: ttf-mscorefonts-installer
        question: msttcorefonts/accepted-mscorefonts-eula
        vtype: boolean
        value: true

    - name: Install ubuntu-restricted-extras
      apt:
        name:
          - ubuntu-restricted-extras # packages utilitaires
        
        state: present